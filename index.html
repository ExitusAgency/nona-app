<head>
  <meta charset="UTF-8">

  <title>Nona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
/* Hallmark · genre: editorial · macrostructure: Bento Grid
 * theme: custom (vibe: "warm authority, trusted companion"
 *   paper oklch(95.5% 0.012 87) · accent oklch(60% 0.085 195) teal
 *   axes: light / high-contrast-serif / cool)
 * nav: N9 edge-aligned · footer: n/a (mobile PWA)
 * fonts: Fraunces 700 display + IBM Plex Sans body + IBM Plex Mono outlier
 * enrichment: none (typography only)
 * pre-emit critique: P4 H4 E4 S4 R4 V4
 */

/* ── OKLCH TOKENS ── */
:root {
  /* Paper & surfaces */
  --color-paper:        oklch(95.5% 0.012  87);
  --color-paper-2:      oklch(91.5% 0.015  85);
  --color-paper-3:      oklch(87%   0.018  83);
  --color-surface:      oklch(98.5% 0.005  87);
  --color-rule:         oklch(85%   0.012  80);

  /* Ink */
  --color-ink:          oklch(20%   0.012 240);
  --color-muted:        oklch(58%   0.010 240);

  /* Brand navy */
  --color-navy:         oklch(26%   0.072 240);
  --color-navy-mid:     oklch(40%   0.092 240);
  --color-navy-light:   oklch(53%   0.095 240);

  /* Accent — teal */
  --color-accent:       oklch(58%   0.088 195);
  --color-accent-dk:    oklch(48%   0.098 195);

  /* Emergency red */
  --color-emergency:    oklch(46%   0.145  27);
  --color-emergency-dk: oklch(36%   0.130  26);

  /* Green */
  --color-green:        oklch(48%   0.112 155);

  /* Focus ring */
  --color-focus:        oklch(62%   0.130 195);

  /* Backward-compatible aliases (used in existing inline styles & JS) */
  --bg:        var(--color-paper);
  --surface:   var(--color-surface);
  --navy:      var(--color-navy);
  --navy-mid:  var(--color-navy-mid);
  --teal:      var(--color-accent);
  --emergency: var(--color-emergency);
  --green:     var(--color-green);
  --text:      var(--color-ink);
  --soft:      var(--color-muted);
  --border:    var(--color-rule);
  --r:         14px;
  --rsm:       10px;
  --pill:      999px;

  /* ── TYPOGRAPHY ── */
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body:    'IBM Plex Sans', -apple-system, sans-serif;
  --font-mono:    'IBM Plex Mono', 'Courier New', monospace;

  /* ── TYPE SCALE (major third 1.25 · base 18 px) ── */
  --text-xs:      0.722rem;   /* ~13 px */
  --text-sm:      0.889rem;   /* ~16 px */
  --text-base:    1rem;       /* 18 px  */
  --text-md:      1.125rem;   /* ~20 px */
  --text-lg:      1.375rem;   /* ~25 px */
  --text-xl:      1.722rem;   /* ~31 px */
  --text-display: clamp(1.9rem, 5vw + 0.4rem, 2.75rem);

  /* ── SPACING (4 pt scale) ── */
  --space-3xs: 0.25rem;
  --space-2xs: 0.5rem;
  --space-xs:  0.75rem;
  --space-sm:  1rem;
  --space-md:  1.5rem;
  --space-lg:  2rem;
  --space-xl:  3rem;

  /* ── RADII ── */
  --r-card:  14px;
  --r-input: 10px;
  --r-btn:   10px;
  --r-pill:  999px;

  /* ── SHADOWS ── */
  --sh:    0 2px 10px oklch(26% 0.072 240 / 0.08),
           0 1px 3px  oklch(26% 0.072 240 / 0.04);
  --sh-up: 0 8px 28px oklch(26% 0.072 240 / 0.13),
           0 2px 8px  oklch(26% 0.072 240 / 0.06);

  /* ── MOTION ── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:     cubic-bezier(0.7, 0, 0.84, 0);
  --dur-short:   180ms;
  --dur-med:     280ms;
}
</style>
</head>
